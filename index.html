body {
  margin:0;

}

/* CONTAINER */
.container {
  max-width:400px;
  margin:fullwidth auto;
  padding:40px 20px;
}

/* FOTO */
.profile img {
  width:100px;
  border-radius:50%;
  margin-bottom:15px;

  animation: fadeIn 1s ease;
}

/* ANIMASI MUNCUL */
@keyframes fadeIn {
  from {opacity:0; transform: translateY(-20px);}
  to {opacity:1; transform: translateY(0);}
}

/* LINK */
.link {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;

  max-width: 320px;
  width: 90%;
  margin: 12px auto;
  padding: 15px;

  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  color: rgb(0, 0, 0);

  transition: 0.3s;
}

/* ICON */
.icon {
  position: absolute;
  left: 15px;
  width: 22px;
}

/* WARNA BRAND */
.shopee {
  background:  #ffffff;
}

.tiktok {
  background:  #ffffff;
}

.instagram {
  background:  #ffffff;
}

.wa {
  background: #ffffff;
}

/* HOVER */
.link:hover {
  transform: translateY(-3px);
  opacity: 0.9;
}

/* ICON DI KIRI */
.icon {
